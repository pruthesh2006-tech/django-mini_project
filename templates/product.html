{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <link rel="stylesheet" 
    href="{% static 'product.css'%}"/>
</head>
<body>
    <h2>All Products</h2>
    <a href="/addproduct">Add Product</a>

    <br><br>

    <table border="1">

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Details</th>
        <th>Price</th>
        <th>Category</th>
        <th>Image</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>   
    {% for i in pdata %}
    <tr>
        <td>{{i.id}}</td>
        <td>{{i.title}}</td>
        <td>{{i.details}}</td>
        <td>{{i.price}}</td>
        <td>{{i.category}}</td>

        <td>
            <img src="{{i.image.url}}" width="100">
        </td>
        <td>
            <a href="/editproduct/{{i.id}}">Edit</a>
        </td>

        <td>
            <a href="/deleteproduct/{{i.id}}">Delete</a>
        </td>
    </tr>
    {% endfor %}
    
    </table>
</body>
</html>
